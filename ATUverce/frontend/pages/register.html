<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATUverce — Регистрация</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { min-height:100vh; display:flex; background:var(--primary); align-items:center; justify-content:center; padding:16px; }
    .auth-card { background:white; border-radius:16px; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.25); width:100%; max-width:460px; }
    .auth-top { background:var(--primary); padding:20px 28px; text-align:center; border-bottom:4px solid var(--red); }
    .auth-title { font-size:24px; font-weight:800; color:white; }
    .auth-title span { color:var(--red); }
    .auth-body { padding:24px 28px; }
    .group-row { display:flex; gap:8px; align-items:flex-end; }
    .group-prefix { width:120px; flex-shrink:0; }
    .group-suffix { flex:1; }
    select.form-input { cursor:pointer; }
    .btn-register { width:100%; padding:13px; background:var(--primary); color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    .btn-register:hover { background:var(--primary-dark); }
    .error-msg { color:var(--red); font-size:13px; margin-bottom:12px; padding:10px; background:var(--red-light); border-radius:8px; border-left:3px solid var(--red); display:none; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-top">
    <div class="auth-title">ATU<span>verce</span></div>
    <div style="color:rgba(255,255,255,0.75);font-size:13px;margin-top:4px">Регистрация студента</div>
  </div>
  <div class="auth-body">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Имя</label>
        <input type="text" id="first_name" class="form-input" placeholder="Айбек">
      </div>
      <div class="form-group">
        <label class="form-label">Фамилия</label>
        <input type="text" id="last_name" class="form-input" placeholder="Матанов">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Логин</label>
      <input type="text" id="username" class="form-input" placeholder="aibek_m">
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="aibek@gmail.com">
    </div>

    <div class="form-group">
      <label class="form-label">Курс</label>
      <select id="year_of_study" class="form-input">
        <option value="">— Выбери курс —</option>
        <option value="1">1 курс</option>
        <option value="2">2 курс</option>
        <option value="3">3 курс</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Группа</label>
      <div class="group-row">
        <div class="group-prefix">
          <select id="group_prefix" class="form-input">
            <option value="">Факультет</option>
            <option value="SCA-">SCA-</option>
            <option value="MAR-">MAR-</option>
            <option value="DES-">DES-</option>
            <option value="CSC-">CSC-</option>
            <option value="ACO-">ACO-</option>
          </select>
        </div>
        <div class="group-suffix">
          <input type="text" id="group_suffix" class="form-input" placeholder="**A" maxlength="4"
            oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>
      

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" id="password" class="form-input" placeholder="Минимум 6 символов">
      </div>
      <div class="form-group">
        <label class="form-label">Повтори пароль</label>
        <input type="password" id="password2" class="form-input" placeholder="Ещё раз">
      </div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <button class="btn-register" onclick="doRegister()">Зарегистрироваться</button>

    <div style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-muted)">
      Уже есть аккаунт? <a href="login.html" style="color:var(--primary);font-weight:700">Войти</a>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
async function doRegister() {
  const first_name = document.getElementById('first_name').value.trim();
  const last_name = document.getElementById('last_name').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const year = document.getElementById('year_of_study').value;
  const prefix = document.getElementById('group_prefix').value;
  const suffix = document.getElementById('group_suffix').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  const show = (msg) => { errEl.textContent = '⚠️ ' + msg; errEl.style.display = 'block'; };

  if (!first_name || !last_name) return show('Введи имя и фамилию');
  if (!username) return show('Введи логин');
  if (!year) return show('Выбери курс');
  if (!prefix) return show('Выбери факультет');
  if (!suffix) return show('Введи номер группы (например 23C)');
  if (password.length < 6) return show('Пароль минимум 6 символов');
  if (password !== password2) return show('Пароли не совпадают');

  const group = prefix + suffix;
  const btn = document.querySelector('.btn-register');
  btn.textContent = 'Регистрируем...'; btn.disabled = true;

  try {
    await api.post('/users/register/', {
      username, email, first_name, last_name,
      password, year_of_study: parseInt(year),
      group, faculty: prefix.replace('-','')
    });
    await api.login(username, password);
    window.location.href = 'feed.html';
  } catch(e) {
    show('Ошибка регистрации. Возможно такой логин уже занят.');
    btn.textContent = 'Зарегистрироваться'; btn.disabled = false;
  }
}
</script>
</body>
</html>
