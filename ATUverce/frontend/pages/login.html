<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATUverce — Вход</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      background: var(--primary);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(200,16,46,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }

    .auth-top {
      background: var(--primary);
      padding: 32px 32px 28px;
      text-align: center;
      border-bottom: 4px solid var(--red);
    }

    .auth-logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 11px;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      line-height: 1.2;
      border: 3px solid var(--red);
    }

    .auth-title {
      font-size: 32px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }
    .auth-title span { color: var(--red); }

    .auth-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }

    .auth-body { padding: 32px; }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(27,58,140,0.1);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    .auth-footer a:hover { color: var(--red); }

    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
      padding: 10px 14px;
      background: var(--red-light);
      border-radius: 8px;
      border-left: 3px solid var(--red);
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-top">
      <div class="auth-logo-circle">АЛА-ТОО<br>IT</div>
      <div class="auth-title">ATU<span>verce</span></div>
      <div class="auth-subtitle">Ала-Тоо International University College</div>
    </div>

    <div class="auth-body">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" id="username" class="form-input" placeholder="Введи свой логин" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" id="password" class="form-input" placeholder="Введи пароль"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>

      <div id="error-msg" class="error-msg">⚠️ Неверный логин или пароль</div>

      <button class="btn-login" onclick="doLogin()">Войти в ATUverce</button>

      <div class="auth-footer">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <div style="text-align:center;margin-top:16px;font-size:12px;color:rgba(255,255,255,0.5)">
    © 2025 ATUverce · Ала-Тоо International University College
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (localStorage.getItem('access_token')) window.location.href = 'feed.html';

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!username || !password) {
    errEl.textContent = '⚠️ Введи логин и пароль';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.querySelector('.btn-login');
  btn.textContent = 'Входим...';
  btn.disabled = true;

  try {
    await api.login(username, password);
    window.location.href = 'feed.html';
  } catch(e) {
    errEl.textContent = '⚠️ Неверный логин или пароль';
    errEl.style.display = 'block';
    btn.textContent = 'Войти в ATUverce';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
